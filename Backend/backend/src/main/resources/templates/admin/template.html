<!DOCTYPE html>
<html lang="pt-BR" data-theme="light"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout (pageTitle, pageHeading, pageSubtitle, activeSection, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light only">
    <title th:text="${pageTitle}">Dashboard — Bolão Copa 2026</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" type="text/css"/>
    <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>

    <link th:href="@{/assets/css/global.css}" rel="stylesheet" type="text/css"/>
    <script th:src="@{/assets/js/template.js}"></script>
</head>

<body class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen">

<div class="drawer" id="app-drawer">
    <input id="sidebar-toggle" type="checkbox" class="drawer-toggle" checked/>
    <script>
        (function () {
            var toggle = document.getElementById('sidebar-toggle');
            if (window.innerWidth < 1024) {
                toggle.checked = false;
            } else if (localStorage.getItem('sidebar-open') === 'false') {
                toggle.checked = false;
            }
        })();
    </script>

    <div class="drawer-content flex flex-col min-h-screen lg:min-h-0 lg:h-full">

        <header class="navbar bg-white border-b border-slate-200 px-4 py-3 lg:px-6 sticky top-0 z-30 shadow-sm">
            <div class="flex-none">
                <label for="sidebar-toggle" class="btn btn-square btn-ghost" title="Abrir/fechar menu">
                    <i data-lucide="panel-left-close" class="w-5 h-5" id="menu-icon"></i>
                </label>
            </div>

            <div class="flex-1">
                <div class="flex items-center gap-3">
                    <div class="hidden sm:flex w-9 h-9 rounded-xl bg-slate-200 border border-slate-300 items-center justify-center">
                        <i data-lucide="trophy" class="w-5 h-5 text-slate-600"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-semibold leading-tight text-slate-700" th:text="${pageHeading}">Dashboard</h1>
                        <p class="text-xs text-slate-500 hidden sm:block" th:text="${pageSubtitle}">
                            Bolão Copa 2026 — Painel Administrativo
                        </p>
                    </div>
                </div>
            </div>

            <div class="flex-none flex items-center gap-2">
                <button class="btn btn-ghost btn-circle btn-sm" id="btn-refresh" title="Atualizar dados" type="button">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                </button>

                <div class="dropdown dropdown-end">
                    <div tabindex="0" role="button" class="btn btn-ghost btn-circle avatar placeholder">
                        <div class="bg-slate-200 text-slate-700 rounded-full w-9 font-bold text-sm border border-slate-300">
                            <span th:text="${#strings.toUpperCase(#strings.substring(#authentication.name, 0, 2))}">AD</span>
                        </div>
                    </div>
                    <ul tabindex="0"
                        class="dropdown-content menu bg-white rounded-box z-50 w-52 p-2 shadow-xl border border-slate-200 mt-2">
                        <li class="menu-title" sec:authentication="name">Administrador</li>
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit">Sair</button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </header>

        <main class="flex-1 p-4 lg:p-6 animate-fade-in flex flex-col gap-6 w-full mx-auto"
              th:insert="${content}"></main>

        <footer class="footer footer-center p-4 mt-auto bg-white border-t border-slate-200 text-slate-400 text-xs">
            <aside>
                <p>Bolão Copa 2026 — v1.0.0
                    <span class="badge badge-info badge-xs badge-outline ml-1">BETA</span>
                </p>
            </aside>
        </footer>
    </div>

    <div class="drawer-side z-40">
        <label for="sidebar-toggle" aria-label="Fechar menu" class="drawer-overlay"></label>
        <aside id="sidebar" class="bg-white w-64 min-h-full border-r border-slate-200 flex flex-col shadow-sm">

            <div class="p-4 border-b border-slate-200">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 shrink-0 rounded-xl bg-gradient-to-br from-slate-200 to-slate-300 border border-slate-300 flex items-center justify-center">
                        <i data-lucide="trophy" class="w-5 h-5 text-slate-700"></i>
                    </div>
                    <div class="min-w-0">
                        <p class="font-bold text-sm leading-tight">BOLÃO</p>
                        <p class="text-slate-700 text-xs font-semibold">COPA 2026</p>
                    </div>
                </div>
            </div>

            <nav class="flex-1 p-3">
                <ul class="menu menu-sm gap-1 p-0">
                    <li>
                        <a th:href="@{/admin}"
                           class="sidebar-link"
                           th:classappend="${activeSection == 'dashboard'} ? 'active' : _">
                            <i data-lucide="layout-dashboard" class="w-4 h-4 shrink-0"></i>
                            Dashboard
                        </a>
                    </li>
                    <li>
                        <a th:href="@{/admin/partidas}"
                           class="sidebar-link"
                           th:classappend="${activeSection == 'partidas'} ? 'active' : _">
                            <i data-lucide="swords" class="w-4 h-4 shrink-0"></i>
                            Partidas
                        </a>
                    </li>
                    <li>
                        <a th:href="@{/admin/palpites}"
                           class="sidebar-link"
                           th:classappend="${activeSection == 'palpites'} ? 'active' : _">
                            <i data-lucide="target" class="w-4 h-4 shrink-0"></i>
                            Palpites
                        </a>
                    </li>
                    <li>
                        <a th:href="@{/admin/usuarios}"
                           class="sidebar-link"
                           th:classappend="${activeSection == 'usuarios'} ? 'active' : _">
                            <i data-lucide="users" class="w-4 h-4 shrink-0"></i>
                            Usuários
                        </a>
                    </li>
                     <li>
                        <a th:href="@{/admin/selecoes}"
                           class="sidebar-link"
                           th:classappend="${activeSection == 'selecoes'} ? 'active' : _">
                            <i data-lucide="target" class="w-4 h-4 shrink-0"></i>
                            Seleções
                        </a>
                    </li>
                    <li>
                        <span class="sidebar-link disabled" title="Em breve">
                            <i data-lucide="trophy" class="w-4 h-4 shrink-0"></i>
                            Ranking
                            <span class="badge badge-xs badge-ghost ml-auto">breve</span>
                        </span>
                    </li>
                </ul>
            </nav>

            <div class="p-4 border-t border-slate-200">
                <div class="flex items-center gap-3 p-3 rounded-xl bg-slate-100 border border-slate-300">
                    <div class="avatar placeholder">
                        <div class="bg-slate-200 text-slate-700 rounded-full w-9 font-bold text-xs border border-slate-300">
                            <span th:text="${#strings.toUpperCase(#strings.substring(#authentication.name, 0, 2))}">AD</span>
                        </div>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-medium truncate">Administrador</p>
                        <p class="text-xs text-slate-500 truncate" sec:authentication="name">admin@copa2026.com.br</p>
                    </div>
                </div>
            </div>

        </aside>
    </div>
</div>

<div class="toast toast-end toast-top z-50" id="toast-container"
     th:attr="data-sucesso=${sucesso}, data-erro=${erro}"></div>

</body>
</html>
