<html xmlns:th="http://www.thymeleaf.org" data-theme="light"
      th:replace="~{admin/template :: layout(
          'Palpites — Bolão Copa 2026',
          'Palpites',
          'Visualizar palpites registrados pelos participantes',
          'palpites',
          ~{::content}
      )}">

<th:block th:fragment="content">

    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <div>
            <h2 class="text-xl font-bold">Palpites</h2>
            <p class="text-sm text-slate-500 mt-1">
                <span th:text="${#lists.size(palpites)} + ' palpite(s)'">0 palpite(s)</span>
                · <span id="live-clock"></span>
            </p>
        </div>
    </div>

    <div class="card-panel rounded-2xl p-4">
        <form method="get" th:action="@{/admin/palpites}" class="flex flex-col gap-3">
            <div class="flex flex-col sm:flex-row gap-3">
                <div class="relative flex-1">
                    <i data-lucide="search" class="w-4 h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none"></i>
                    <input type="search" name="busca" th:value="${busca}"
                           placeholder="Buscar por nome ou e-mail do participante..."
                           class="admin-input w-full pl-10"/>
                </div>
                <select name="partidaId" class="admin-input w-full sm:w-64">
                    <option value="">Todas as partidas</option>
                    <option th:each="p : ${partidas}"
                            th:value="${p.id}"
                            th:selected="${partidaFiltro != null and partidaFiltro == p.id}"
                            th:text="${p.selecaoA.nome + ' x ' + p.selecaoB.nome + ' — ' + #temporals.format(p.dataHora, 'dd/MM/yyyy HH:mm')}">
                        Brasil x Argentina — 15/06/2026 20:00
                    </option>
                </select>
                <select name="criterio" class="admin-input w-full sm:w-48">
                    <option value="">Todos os critérios</option>
                    <option th:each="c : ${criterios}"
                            th:value="${c.name()}"
                            th:selected="${criterioFiltro != null and criterioFiltro == c}"
                            th:text="${c.name() == 'PENDENTE' ? 'Pendente' :
                                (c.name() == 'PLACAR_EXATO' ? 'Placar exato' :
                                (c.name() == 'VENCEDOR_EMPATE' ? 'Vencedor/Empate' : 'Errou'))}">
                        Pendente
                    </option>
                </select>
            </div>
            <div class="flex gap-2 sm:justify-end">
                <button type="submit" class="btn btn-success flex-1 sm:flex-none sm:min-w-32">Filtrar</button>
                <a th:href="@{/admin/palpites}" class="btn btn-ghost flex-1 sm:flex-none sm:min-w-32">Limpar</a>
            </div>
        </form>
    </div>

    <div class="card-panel rounded-2xl overflow-hidden">
        <div class="overflow-x-auto">
            <table class="admin-table min-w-[960px]">
                <thead>
                    <tr>
                        <th class="pl-6 min-w-[200px]">Participante</th>
                        <th class="min-w-[220px]">Partida</th>
                        <th class="whitespace-nowrap text-center">Palpite</th>
                        <th class="whitespace-nowrap text-center">Resultado</th>
                        <th class="whitespace-nowrap text-center">Pontos</th>
                        <th class="whitespace-nowrap">Critério</th>
                        <th class="whitespace-nowrap pr-6">Registrado em</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="palpite : ${palpites}">
                        <td class="pl-6">
                            <div class="flex items-center gap-3">
                                <div class="avatar placeholder">
                                    <div class="bg-slate-100 text-slate-600 rounded-full w-9"
                                         th:if="${palpite.usuario.avatarUrl == null}">
                                        <span class="text-sm font-medium"
                                              th:text="${#strings.toUpperCase(#strings.substring(palpite.usuario.nome, 0, 1))}">
                                            C
                                        </span>
                                    </div>
                                    <div class="rounded-full w-9" th:if="${palpite.usuario.avatarUrl != null}">
                                        <img th:src="${palpite.usuario.avatarUrl}" th:alt="${palpite.usuario.nome}"/>
                                    </div>
                                </div>
                                <div class="min-w-0">
                                    <p class="font-medium truncate" th:text="${palpite.usuario.nome}">Nome</p>
                                    <p class="text-sm text-slate-500 truncate" th:text="${palpite.usuario.email}">email</p>
                                </div>
                            </div>
                        </td>
                        <td>
                            <div class="flex items-center gap-2">
                                <span class="inline-flex items-center gap-1.5 min-w-0 max-w-[100px]">
                                    <img th:if="${palpite.partida.selecaoA.bandeiraUrl != null and !#strings.isEmpty(palpite.partida.selecaoA.bandeiraUrl)}"
                                         th:src="${palpite.partida.selecaoA.bandeiraUrl}"
                                         th:alt="${palpite.partida.selecaoA.nome}"
                                         class="w-5 h-5 rounded-full object-cover shrink-0"/>
                                    <span class="truncate text-sm" th:text="${palpite.partida.selecaoA.nome}">Brasil</span>
                                </span>
                                <span class="text-slate-400 text-xs shrink-0">x</span>
                                <span class="inline-flex items-center gap-1.5 min-w-0 max-w-[100px]">
                                    <img th:if="${palpite.partida.selecaoB.bandeiraUrl != null and !#strings.isEmpty(palpite.partida.selecaoB.bandeiraUrl)}"
                                         th:src="${palpite.partida.selecaoB.bandeiraUrl}"
                                         th:alt="${palpite.partida.selecaoB.nome}"
                                         class="w-5 h-5 rounded-full object-cover shrink-0"/>
                                    <span class="truncate text-sm" th:text="${palpite.partida.selecaoB.nome}">Argentina</span>
                                </span>
                            </div>
                            <p class="text-xs text-slate-500 mt-1"
                               th:text="${#temporals.format(palpite.partida.dataHora, 'dd/MM/yyyy HH:mm')}">
                                15/06/2026 20:00
                            </p>
                        </td>
                        <td class="text-center">
                            <span class="font-semibold tabular-nums text-sm"
                                  th:text="${palpite.golsSelecaoA + ' × ' + palpite.golsSelecaoB}">2 × 1</span>
                        </td>
                        <td class="text-center">
                            <span th:if="${palpite.partida.golsSelecaoA != null and palpite.partida.golsSelecaoB != null}"
                                  class="font-semibold tabular-nums text-sm text-slate-600"
                                  th:text="${palpite.partida.golsSelecaoA + ' × ' + palpite.partida.golsSelecaoB}">1 × 0</span>
                            <span th:if="${palpite.partida.golsSelecaoA == null or palpite.partida.golsSelecaoB == null}"
                                  class="text-slate-400">—</span>
                        </td>
                        <td class="text-center">
                            <span class="badge badge-success badge-outline tabular-nums"
                                  th:text="${palpite.pontos} + ' pts'">0 pts</span>
                        </td>
                        <td>
                            <span class="badge badge-outline text-xs whitespace-nowrap"
                                  th:classappend="${palpite.criterioPontuacao.name() == 'PENDENTE' ? ' border-sky-200 bg-sky-50 text-sky-700' :
                                    (palpite.criterioPontuacao.name() == 'PLACAR_EXATO' ? ' border-green-200 bg-green-50 text-green-700' :
                                    (palpite.criterioPontuacao.name() == 'VENCEDOR_EMPATE' ? ' border-amber-200 bg-amber-50 text-amber-700' : ' border-slate-200 bg-slate-50 text-slate-600'))}"
                                  th:text="${palpite.criterioPontuacao.name() == 'PENDENTE' ? 'Pendente' :
                                    (palpite.criterioPontuacao.name() == 'PLACAR_EXATO' ? 'Placar exato' :
                                    (palpite.criterioPontuacao.name() == 'VENCEDOR_EMPATE' ? 'Vencedor/Empate' : 'Errou'))}">
                                Pendente
                            </span>
                        </td>
                        <td class="pr-6 text-sm text-slate-500 whitespace-nowrap"
                            th:text="${#temporals.format(palpite.criadoEm, 'dd/MM/yyyy HH:mm')}">
                            01/06/2026 14:30
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(palpites)}">
                        <td colspan="7" class="text-center text-slate-500 py-12">
                            Nenhum palpite encontrado.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script th:inline="javascript">
        (function () {
            const el = document.getElementById('live-clock');
            if (!el) return;

            function tick() {
                const now = new Date();
                el.textContent = now.toLocaleString('pt-BR', {
                    weekday: 'short',
                    day: '2-digit',
                    month: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            }

            tick();
            setInterval(tick, 30000);
        })();
    </script>

</th:block>
</html>
