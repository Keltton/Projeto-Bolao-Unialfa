<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="light"
      th:replace="~{admin/template :: layout(
          'Dashboard — Bolão Copa 2026',
          'Dashboard',
          'Bolão Copa 2026 — Painel Administrativo',
          'dashboard',
          ~{::content}
      )}">

<th:block th:fragment="content">

    <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4">
        <div class="stat-card card-panel rounded-2xl p-5">
            <div class="flex items-start justify-between">
                <div>
                    <p class="text-sm text-slate-500">Usuários</p>
                    <p class="text-3xl font-bold mt-1" th:text="${dashboard.totalUsuarios}">—</p>
                </div>
                <div class="w-10 h-10 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center">
                    <i data-lucide="users" class="w-5 h-5"></i>
                </div>
            </div>
        </div>

        <div class="stat-card card-panel rounded-2xl p-5">
            <div class="flex items-start justify-between">
                <div>
                    <p class="text-sm text-slate-500">Palpites</p>
                    <p class="text-3xl font-bold mt-1" th:text="${dashboard.totalPalpites}">—</p>
                </div>
                <div class="w-10 h-10 rounded-xl bg-green-50 text-green-600 flex items-center justify-center">
                    <i data-lucide="target" class="w-5 h-5"></i>
                </div>
            </div>
        </div>

        <div class="stat-card card-panel rounded-2xl p-5">
            <div class="flex items-start justify-between">
                <div>
                    <p class="text-sm text-slate-500">Partidas pendentes</p>
                    <p class="text-3xl font-bold mt-1" th:text="${dashboard.partidasPendentes}">—</p>
                </div>
                <div class="w-10 h-10 rounded-xl bg-amber-50 text-amber-600 flex items-center justify-center">
                    <i data-lucide="swords" class="w-5 h-5"></i>
                </div>
            </div>
        </div>

        <div class="stat-card card-panel rounded-2xl p-5">
            <div class="flex items-start justify-between">
                <div>
                    <p class="text-sm text-slate-500">Usuários ativos</p>
                    <p class="text-3xl font-bold mt-1" th:text="${dashboard.usuariosAtivos}">—</p>
                </div>
                <div class="w-10 h-10 rounded-xl bg-purple-50 text-purple-600 flex items-center justify-center">
                    <i data-lucide="activity" class="w-5 h-5"></i>
                </div>
            </div>
        </div>
    </div>

    <div class="card-panel rounded-2xl p-6">
        <h2 class="text-lg font-semibold mb-2">Visão geral</h2>
        <p class="text-slate-500 text-sm">
            Bem-vindo ao painel administrativo. Use o menu lateral para gerenciar partidas, palpites, usuários e relatórios.
        </p>
    </div>

</th:block>

</html>
