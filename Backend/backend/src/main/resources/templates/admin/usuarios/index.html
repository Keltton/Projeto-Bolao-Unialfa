<html xmlns:th="http://www.thymeleaf.org" data-theme="light"
      th:replace="~{admin/template :: layout(
          'Usuários — Bolão Copa 2026',
          'Usuários',
          'Gerenciar participantes do bolão',
          'usuarios',
          ~{::content}
      )}">

<th:block th:fragment="content">

    <!-- Cabeçalho da seção -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <div>
            <h2 class="text-xl font-bold">Participantes</h2>
            <p class="text-sm text-slate-500 mt-1">
                <span th:text="${usuarios.totalElements} + ' usuário(s)'">0 usuário(s)</span>
                · <span id="live-clock"></span>
            </p>
        </div>
    </div>

    <!-- Filtros -->
    <div class="card-panel rounded-2xl p-4">
        <form method="get" th:action="@{/admin/usuarios}" class="flex flex-col sm:flex-row gap-3">
            <div class="relative flex-1">
                <i data-lucide="search" class="w-4 h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none"></i>
                <input type="search" name="busca" th:value="${busca}"
                       placeholder="Buscar por nome ou e-mail..."
                       class="admin-input pl-10"/>
            </div>
            <button type="submit" class="btn btn-success sm:w-32">Buscar</button>
        </form>
    </div>

    <!-- Tabela de usuários -->
    <div class="card-panel rounded-2xl overflow-hidden">
        <div class="overflow-x-auto">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th class="pl-6">Usuário</th>
                            <th>Perfil</th>
                            <th>Placares exatos</th>
                            <th>Pontos</th>
                            <th>Status</th>
                            <th>Cadastro</th>
                            <th class="text-right pr-6">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="u : ${usuarios.content}">
                            <td class="pl-6">
                                <div class="flex items-center gap-3">
                                    <div class="avatar placeholder">
                                        <div class="bg-slate-100 text-slate-600 rounded-full w-9"
                                             th:if="${u.avatarUrl == null}">
                                            <span class="text-sm font-medium"
                                                  th:text="${#strings.toUpperCase(#strings.substring(u.nome, 0, 1))}">
                                                C
                                            </span>
                                        </div>
                                        <div class="rounded-full w-9" th:if="${u.avatarUrl != null}">
                                            <img th:src="${u.avatarUrl}" th:alt="${u.nome}"/>
                                        </div>
                                    </div>
                                    <div class="flex-1 min-w-0">
                                        <p class="text-base font-medium truncate" th:text="${u.nome}">Nome</p>
                                        <p class="text-sm text-slate-500 truncate" th:text="${u.email}">email</p>
                                    </div>
                                </div>
                            </td>
                            <td>
                                <span class="badge badge-ghost"
                                      th:text="${u.perfil.name() == 'ADMIN' ? 'Admin' : 'Usuário'}">Usuário</span>
                            </td>
                            <td>
                                <span class="badge badge-ghost" th:text="${u.placaresExatos}">0</span>
                            </td>
                            <td>
                                <span class="badge badge-success badge-outline"
                                      th:text="${u.pontuacaoTotal} + ' pts'">0 pts</span>
                            </td>
                            <td>
                                <span class="badge badge-outline"
                                      th:classappend="${u.status.name() == 'ATIVO' ? ' badge-success' : (u.status.name() == 'BLOQUEADO' ? ' badge-error' : ' badge-ghost')}"
                                      th:text="${u.status.name() == 'ATIVO' ? 'Ativo' : (u.status.name() == 'BLOQUEADO' ? 'Bloqueado' : 'Excluído')}">
                                    Ativo
                                </span>
                            </td>
                            <td class="text-base text-slate-500 whitespace-nowrap"
                                th:text="${#temporals.format(u.criadoEm, 'dd/MM/yyyy')}">
                                01/06/2026
                            </td>
                            <td class="text-center">
                                <div class="flex items-center justify-start gap-2">
                                    <button type="button"
                                            class="btn btn-ghost btn-md btn-square btn-ver-usuario"
                                            title="Visualizar"
                                            th:attr="data-avatar=${u.avatarUrl},data-nome=${u.nome},data-email=${u.email},data-perfil=${u.perfil},data-status=${u.status},data-pontos=${u.pontuacaoTotal},data-placares=${u.placaresExatos},data-cadastro=${#temporals.format(u.criadoEm, 'dd/MM/yyyy HH:mm')}">
                                        <i data-lucide="eye" class="w-5 h-5"></i>
                                    </button>

                                    <button th:if="${u.status.name() == 'ATIVO'}"
                                            type="button"
                                            class="btn btn-ghost btn-md btn-square text-warning btn-alterar-status"
                                            title="Bloquear"
                                            th:attr="data-id=${u.id},data-nome=${u.nome},data-acao='bloquear',data-status='BLOQUEADO'">
                                        <i data-lucide="ban" class="w-5 h-5"></i>
                                    </button>

                                    <button th:if="${u.status.name() == 'BLOQUEADO'}"
                                            type="button"
                                            class="btn btn-ghost btn-md btn-square text-success btn-alterar-status"
                                            title="Desbloquear"
                                            th:attr="data-id=${u.id},data-nome=${u.nome},data-acao='desbloquear',data-status='ATIVO'">
                                        <i data-lucide="lock-open" class="w-5 h-5"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>

                        <tr th:if="${usuarios.empty}">
                            <td colspan="7" class="text-center text-slate-500 py-12">
                                Nenhum usuário encontrado.
                            </td>
                        </tr>
                    </tbody>
                </table>
        </div>
    </div>

    <!-- Paginação -->
    <div class="flex justify-center gap-2" th:if="${usuarios.totalPages > 1}">
        <a th:each="i : ${#numbers.sequence(0, usuarios.totalPages - 1)}"
           th:href="@{/admin/usuarios(pagina=${i}, busca=${busca})}"
           th:text="${i + 1}"
           th:class="${i == paginaAtual} ? 'btn btn-sm btn-success' : 'btn btn-sm btn-ghost'">
        </a>
    </div>

    <!-- Modal detalhes -->
    <dialog id="modal-detalhes" class="modal">
        <div class="modal-box max-w-md bg-white text-slate-800">
            <div class="flex flex-col items-center gap-3 pb-4 border-b border-slate-100">
                <div class="avatar">
                    <div class="w-20 rounded-full ring ring-success/20 ring-offset-2">
                        <img id="modal-detalhes-avatar"
                             src=""
                             alt="Avatar"
                             class="hidden w-full h-full object-cover"/>
                        <div id="modal-detalhes-avatar-placeholder"
                             class="bg-slate-100 text-slate-600 w-full h-full flex items-center justify-center rounded-full">
                            <span id="modal-detalhes-inicial" class="text-2xl font-bold">?</span>
                        </div>
                    </div>
                </div>
                <h3 class="font-bold text-lg" id="modal-detalhes-nome">Usuário</h3>
            </div>
            <div class="py-4 space-y-2 text-sm">
                <p><span class="text-slate-500">E-mail:</span> <span id="modal-detalhes-email"></span></p>
                <p><span class="text-slate-500">Perfil:</span> <span id="modal-detalhes-perfil"></span></p>
                <p><span class="text-slate-500">Status:</span> <span id="modal-detalhes-status"></span></p>
                <p><span class="text-slate-500">Pontos:</span> <span id="modal-detalhes-pontos"></span></p>
                <p><span class="text-slate-500">Placares exatos:</span> <span id="modal-detalhes-placares"></span></p>
                <p><span class="text-slate-500">Cadastro:</span> <span id="modal-detalhes-cadastro"></span></p>
            </div>
            <div class="modal-action">
                <form method="dialog"><button class="btn">Fechar</button></form>
            </div>
        </div>
        <form method="dialog" class="modal-backdrop"><button>Fechar</button></form>
    </dialog>

    <!-- Modal confirmação -->
    <dialog id="modal-confirmacao" class="modal">
        <div class="modal-box max-w-sm bg-white text-slate-800">
            <h3 class="font-bold text-lg" id="modal-confirmacao-titulo">Confirmar ação</h3>
            <p class="py-4 text-sm text-slate-600" id="modal-confirmacao-texto"></p>
            <form id="form-alterar-status" method="post" class="modal-action gap-2">
                <input type="hidden" name="status" id="input-status"/>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="button" class="btn btn-ghost" onclick="document.getElementById('modal-confirmacao').close()">Cancelar</button>
                <button type="submit" class="btn btn-warning" id="btn-confirmar-acao">Confirmar</button>
            </form>
        </div>
        <form method="dialog" class="modal-backdrop"><button>Fechar</button></form>
    </dialog>

    <script th:inline="javascript">
        function initLiveClock() {
            const el = document.getElementById('live-clock');
            if (!el) return;
            const tick = () => {
                el.textContent = new Date().toLocaleString('pt-BR', {
                    weekday: 'short', day: '2-digit', month: 'short',
                    hour: '2-digit', minute: '2-digit'
                });
            };
            tick();
            setInterval(tick, 60000);
        }

        function initUsuariosPage() {
            initLiveClock();
            lucide.createIcons();

            document.querySelectorAll('.btn-ver-usuario').forEach(btn => {
                btn.addEventListener('click', () => {
                    const avatarUrl = btn.dataset.avatar;
                    const img = document.getElementById('modal-detalhes-avatar');
                    const placeholder = document.getElementById('modal-detalhes-avatar-placeholder');
                    const inicial = document.getElementById('modal-detalhes-inicial');

                    document.getElementById('modal-detalhes-nome').textContent = btn.dataset.nome;
                    document.getElementById('modal-detalhes-email').textContent = btn.dataset.email;
                    document.getElementById('modal-detalhes-perfil').textContent =
                        btn.dataset.perfil === 'ADMIN' ? 'Admin' : 'Usuário';
                    document.getElementById('modal-detalhes-status').textContent =
                        btn.dataset.status === 'ATIVO' ? 'Ativo'
                            : btn.dataset.status === 'BLOQUEADO' ? 'Bloqueado' : 'Excluído';
                    document.getElementById('modal-detalhes-pontos').textContent = btn.dataset.pontos + ' pts';
                    document.getElementById('modal-detalhes-placares').textContent = btn.dataset.placares;
                    document.getElementById('modal-detalhes-cadastro').textContent = btn.dataset.cadastro;
                    document.getElementById('modal-detalhes').showModal();
                });
            });

            document.querySelectorAll('.btn-alterar-status').forEach(btn => {
                btn.addEventListener('click', () => {
                    const acao = btn.dataset.acao;
                    const nome = btn.dataset.nome;
                    document.getElementById('modal-confirmacao-titulo').textContent =
                        acao === 'bloquear' ? 'Bloquear usuário' : 'Desbloquear usuário';
                    document.getElementById('modal-confirmacao-texto').textContent =
                        acao === 'bloquear'
                            ? `Deseja bloquear ${nome}? Ele não poderá mais acessar o bolão.`
                            : `Deseja desbloquear ${nome}?`;
                    document.getElementById('input-status').value = btn.dataset.status;
                    document.getElementById('form-alterar-status').action =
                        /*[[@{/admin/usuarios/}]]*/ '/admin/usuarios/' + btn.dataset.id + '/status';
                    document.getElementById('btn-confirmar-acao').className =
                        acao === 'bloquear' ? 'btn btn-warning' : 'btn btn-success';
                    document.getElementById('modal-confirmacao').showModal();
                });
            });
        }

        document.addEventListener('DOMContentLoaded', initUsuariosPage);
    </script>

</th:block>

</html>
